{{define "content"}}
<div class="max-w-lg space-y-4">

  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold text-stone-100">New Raised Bed</h1>
    <a href="/beds" class="text-sm text-stone-400 hover:text-stone-200">← Back</a>
  </div>

  <div class="bg-stone-800 border border-stone-700 rounded-xl p-6">
    <form method="POST" action="/beds" class="space-y-5">

      <div>
        <label class="block text-sm font-medium text-stone-200 mb-1">Name</label>
        <input type="text" name="name" placeholder="e.g. North Bed, 3×10 Tomato Bed"
               class="w-full bg-stone-900 border border-stone-600 text-stone-100 placeholder-stone-500 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
               autofocus required>
      </div>

      <div>
        <label class="block text-sm font-medium text-stone-200 mb-1">Size <span class="font-normal text-stone-500 text-xs">(1 cell = 1 plant position) · click to select</span></label>
        <div class="grid grid-cols-4 gap-2 mb-3" id="size-grid">
          {{range .Sizes}}
          <label class="size-option flex items-center justify-center border border-stone-600 bg-stone-900 text-stone-300 rounded-lg py-2.5 px-1 text-sm cursor-pointer hover:border-green-500 hover:text-green-400 transition-colors">
            <input type="radio" name="size" value="{{.}}" class="sr-only" onchange="selectSize(this)"> {{.}}
          </label>
          {{end}}
        </div>
        <div class="flex items-center gap-2 text-sm text-stone-400">
          <span>or custom:</span>
          <input type="number" name="rows" min="1" max="100" placeholder="rows"
                 class="w-20 bg-stone-900 border border-stone-600 text-stone-100 placeholder-stone-500 rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-green-500">
          <span>×</span>
          <input type="number" name="cols" min="1" max="100" placeholder="cols"
                 class="w-20 bg-stone-900 border border-stone-600 text-stone-100 placeholder-stone-500 rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-green-500">
        </div>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit" class="bg-green-600 text-white text-sm px-5 py-2 rounded-lg hover:bg-green-700 transition-colors">
          Create Bed
        </button>
        <a href="/beds" class="text-sm text-stone-400 hover:text-stone-200 px-3 py-2">Cancel</a>
      </div>

    </form>
  </div>

</div>
<script>
function selectSize(radio) {
  document.querySelectorAll('.size-option').forEach(function(el) {
    el.classList.remove('border-green-500', 'bg-green-900', 'text-green-300');
    el.classList.add('border-stone-600', 'bg-stone-900', 'text-stone-300');
  });
  var lbl = radio.closest('.size-option');
  lbl.classList.remove('border-stone-600', 'bg-stone-900', 'text-stone-300');
  lbl.classList.add('border-green-500', 'bg-green-900', 'text-green-300');
}
</script>
{{end}}
